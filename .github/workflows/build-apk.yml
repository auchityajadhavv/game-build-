name: Build Android APK

# Builds an installable debug APK for Prism Drift on every push (and on demand).
# Grab the APK from the run's "Artifacts" section, or from the GitHub Release
# created when you push a tag like v1.0.0.

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Lock app to portrait orientation
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:screenOrientation="portrait"#' "$MANIFEST"
          echo "----- patched manifest -----"
          cat "$MANIFEST"

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/prism-drift.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-drift-apk
          path: dist/prism-drift.apk
          if-no-files-found: error

      - name: Attach APK to Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/prism-drift.apk
